<header class="top-bar" hx-get="/partials/top-bar" hx-trigger="every 5s" hx-swap="outerHTML">
  <div class="brand">
    <span class="brand-name">Equity Momentum Trader</span>
    <span class="muted time">{{ now }}</span>
  </div>
  <div class="pills">
    <span class="pill {% if bar.worker_alive %}ok{% else %}bad{% endif %}">
      worker: {{ 'running' if bar.worker_alive else 'stopped' }}
    </span>
    <span class="pill token-{{ bar.token_state }}" title="{{ bar.token_label }}">
      token: {{ bar.token_state }}
    </span>
    <span class="pill market-{{ bar.market_status }}">market: {{ bar.market_status }}</span>

    <form method="post" action="/settings/live-enabled" class="inline-form">
      {% if bar.live_enabled %}
        <input type="hidden" name="enabled" value="0">
        <button type="submit" class="pill pill-btn live-on"
                title="Live trading is ON — click to halt new placements.">
          live: ON
        </button>
      {% else %}
        <input type="hidden" name="enabled" value="1">
        <button type="submit" class="pill pill-btn live-off"
                title="Live trading is OFF — click to enable.">
          live: OFF
        </button>
      {% endif %}
    </form>

  </div>
</header>
